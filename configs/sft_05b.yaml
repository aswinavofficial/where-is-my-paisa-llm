# SFT config for Qwen2.5 0.5B (ultra-light budget device model)
# Target GPU: T4 (16 GB) on Google Colab Free

model:
  base_model: "Qwen/Qwen2.5-0.5B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  use_gradient_checkpointing: "unsloth"

training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  warmup_steps: 10
  num_train_epochs: 3
  learning_rate: 2e-4
  lr_scheduler_type: "cosine"
  weight_decay: 0.01
  optim: "adamw_8bit"
  packing: false
  seed: 42
  output_dir: "outputs/qwen2.5-0.5b-finance"
  logging_steps: 10
  save_strategy: "epoch"

data:
  train_file: "training/data/splits/train.jsonl"
  val_file: "training/data/splits/validation.jsonl"
  text_field: "text"

export:
  quantization_methods:
    - "q4_k_m"
    - "q3_k_m"
  gguf_output_dir: "gguf/qwen2.5-0.5b-finance"
