# DPO alignment config (optional Stage B per research/finetune.md)
# Run after SFT to improve tone, safety, and brevity

model:
  sft_model_path: "outputs/llama-3.2-1b-finance/lora_adapter"
  max_seq_length: 1024
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  use_gradient_checkpointing: "unsloth"

dpo:
  beta: 0.1
  max_prompt_length: 512
  max_length: 1024

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  learning_rate: 5e-5
  lr_scheduler_type: "linear"
  weight_decay: 0.01
  optim: "adamw_8bit"
  seed: 42
  output_dir: "outputs/llama-3.2-1b-finance-dpo"
  logging_steps: 5

data:
  preference_file: "training/data/dpo_preferences.jsonl"
