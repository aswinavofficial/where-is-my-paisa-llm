# SFT config for Llama 3.2 3B (flagship tier)
# Target GPU: A100 40GB (Colab Pro required)

model:
  base_model: "meta-llama/Llama-3.2-3B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  use_gradient_checkpointing: "unsloth"

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_steps: 10
  num_train_epochs: 3
  learning_rate: 1e-4
  lr_scheduler_type: "cosine"
  weight_decay: 0.01
  optim: "adamw_8bit"
  packing: false
  seed: 42
  output_dir: "outputs/llama-3.2-3b-finance"
  logging_steps: 10
  save_strategy: "epoch"

data:
  train_file: "training/data/splits/train.jsonl"
  val_file: "training/data/splits/validation.jsonl"
  text_field: "text"

export:
  quantization_methods:
    - "q4_k_m"
    - "q5_k_m"
  gguf_output_dir: "gguf/llama-3.2-3b-finance"
